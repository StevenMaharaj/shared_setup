  # Better prefix (optional — Ctrl+a is easier than Ctrl+b)
  unbind C-b
  set -g prefix C-a
  bind C-a send-prefix

  # Mouse support
  set -g mouse on

  # Start windows and panes at 1, not 0
  set -g base-index 1
  setw -g pane-base-index 1

  # Renumber windows when one is closed
  set -g renumber-windows on

  # Bigger scrollback buffer
  set -g history-limit 10000

  # No delay after pressing Escape (important for vim/neovim)
  set -sg escape-time 0

  # Split panes with | and - (more intuitive)
  bind | split-window -h -c "#{pane_current_path}"
  bind - split-window -v -c "#{pane_current_path}"

  # New window opens in current path
  bind c new-window -c "#{pane_current_path}"

  # Vim-style pane navigation
  bind h select-pane -L
  bind j select-pane -D
  bind k select-pane -U
  bind l select-pane -R

  # Resize panes with Ctrl+arrow (no prefix needed)
  bind -n C-Left  resize-pane -L 5
  bind -n C-Right resize-pane -R 5
  bind -n C-Up    resize-pane -U 5
  bind -n C-Down  resize-pane -D 5

  # Reload config with Ctrl+a r
  bind r source-file ~/.tmux.conf \; display "Config reloaded"

  # Status bar
  set -g status-position top
  set -g status-style 'bg=colour235,fg=white'
  set -g window-status-current-style 'bg=green,fg=black,bold'
  set -g status-left '[#S] '          # show session name
  set -g status-right '%H:%M %d-%b'   # time and date

  # Active pane border highlight
  set -g pane-active-border-style 'fg=green'
  set -g pane-border-style 'fg=colour238'

  # 256 colors
  set -g default-terminal "screen-256color"

